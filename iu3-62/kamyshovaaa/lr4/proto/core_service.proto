syntax = "proto3";

package com.cinema.proto.core;

option java_package = "com.cinema.proto.core";
option java_outer_classname = "CoreServiceOuterClass";

import "google/protobuf/empty.proto";

service CoreService {
    rpc BuyTicket (BuyTicketRequest) returns (BuyTicketResponse);
    rpc UseTicket (UseTicketRequest) returns (google.protobuf.Empty);
    rpc CancelTicket (CancelTicketRequest) returns (google.protobuf.Empty);
    rpc GetTicket (GetTicketRequest) returns (GetTicketResponse);
    rpc ListTickets (google.protobuf.Empty) returns (ListTicketsResponse);
}

message BuyTicketRequest {
    string screening_id = 1;
    int32 row = 2;
    int32 seat_number = 3;
    int32 category_index = 4;
}

message BuyTicketResponse {
    string ticket_id = 1;
    double final_price = 2;
}

message UseTicketRequest {
    string ticket_id = 1;
}

message CancelTicketRequest {
    string ticket_id = 1;
}

message GetTicketRequest {
    string ticket_id = 1;
}

message GetTicketResponse {
    string ticket_id = 1;
    string screening_id = 2;
    int32 row = 3;
    int32 seat_number = 4;
    double price = 5;
    string status = 6;
}

message ListTicketsResponse {
    repeated TicketInfo tickets = 1;
}

message TicketInfo {
    string ticket_id = 1;
    string screening_id = 2;
    int32 row = 3;
    int32 seat_number = 4;
    double price = 5;
    string status = 6;
}
