syntax = "proto3";

import "reference.proto";

service CoreService {
  rpc CreateOrder (CreateOrderRequest) returns (OrderResponse);
  rpc GetOrderStatus (GetOrderStatusRequest) returns (OrderStatusResponse);
  rpc AssignTransport (AssignTransportRequest) returns (AssignResponse);
  rpc UpdateDeliveryStatus (UpdateStatusRequest) returns (StatusResponse);
  rpc GetOrderDetails (GetOrderDetailsRequest) returns (OrderDetailsResponse);
}

message CreateOrderRequest {
  string customer_name = 1;
  string pickup_address = 2;
  string delivery_address = 3;
  double weight_kg = 4;
  double distance_km = 5;
  string zone = 6;
}

message OrderResponse {
  string order_id = 1;
  string status = 2;
  double total_cost = 3;
  string message = 4;
}

message GetOrderStatusRequest {
  string order_id = 1;
}

message OrderStatusResponse {
  string order_id = 1;
  string status = 2;
  string assigned_vehicle = 3;
  string last_update = 4;
}

message AssignTransportRequest {
  string order_id = 1;
  string vehicle_type_id = 2;
}

message AssignResponse {
  bool success = 1;
  string message = 2;
  string vehicle_id = 3;
}

message UpdateStatusRequest {
  string order_id = 1;
  string new_status = 2;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message GetOrderDetailsRequest {
  string order_id = 1;
}

message OrderDetailsResponse {
  string order_id = 1;
  string customer_name = 2;
  string pickup_address = 3;
  string delivery_address = 4;
  double weight_kg = 5;
  double distance_km = 6;
  string zone = 7;
  double total_cost = 8;
  string status = 9;
}