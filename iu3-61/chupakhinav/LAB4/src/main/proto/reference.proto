syntax = "proto3";

package travel.reference;

option java_package = "ru.bmstu.travel.proto.reference";
option java_outer_classname = "ReferenceProto";
option java_multiple_files = true;

message Empty {}

enum DiscountType {
  DISCOUNT_TYPE_UNSPECIFIED = 0;
  PERCENTAGE = 1;
  VIP = 2;
  SEASONAL = 3;
}

message Discount {
  string name = 1;
  int32 percent = 2;
  DiscountType type = 3;
}

message Client {
  string id = 1;
  string full_name = 2;
  string phone = 3;
  bool has_discount = 4;
  Discount discount = 5;
}

message Tour {
  string id = 1;
  string title = 2;
  string destination = 3;
  double base_price = 4;
  int32 capacity = 5;
  int32 booked_seats = 6;
}

message ClientRequest {
  string client_id = 1;
}

message TourRequest {
  string tour_id = 1;
}

message ClientResponse {
  bool found = 1;
  string message = 2;
  Client client = 3;
}

message TourResponse {
  bool found = 1;
  string message = 2;
  Tour tour = 3;
}

message ListClientsResponse {
  repeated Client clients = 1;
}

message ListToursResponse {
  repeated Tour tours = 1;
}

message AddClientRequest {
  string full_name = 1;
  string phone = 2;
  bool has_discount = 3;
  Discount discount = 4;
}

message AddTourRequest {
  string title = 1;
  string destination = 2;
  double base_price = 3;
  int32 capacity = 4;
}

message ClientMutationResponse {
  bool success = 1;
  string message = 2;
  Client client = 3;
}

message TourMutationResponse {
  bool success = 1;
  string message = 2;
  Tour tour = 3;
}

service ReferenceService {
  rpc GetClient(ClientRequest) returns (ClientResponse);
  rpc GetTour(TourRequest) returns (TourResponse);
  rpc ListClients(Empty) returns (ListClientsResponse);
  rpc ListTours(Empty) returns (ListToursResponse);
  rpc AddClient(AddClientRequest) returns (ClientMutationResponse);
  rpc AddTour(AddTourRequest) returns (TourMutationResponse);
  rpc ReserveTourSeat(TourRequest) returns (TourMutationResponse);
  rpc ReleaseTourSeat(TourRequest) returns (TourMutationResponse);
}
