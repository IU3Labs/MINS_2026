syntax = "proto3";
option java_package = "com.university.proto.core";
option java_multiple_files = true;
package core;

// ===== Service Definition =====
service CoreService {
  rpc RegisterStudent(RegisterStudentRequest) returns (RegisterStudentResponse);

  rpc AddGrade(AddGradeRequest) returns (AddGradeResponse);

  rpc MarkAttendance(MarkAttendanceRequest) returns (MarkAttendanceResponse);

  rpc GetGradeReport(GetGradeReportRequest) returns (GetGradeReportResponse);


  rpc CalculateDiscount(CalculateDiscountRequest) returns (CalculateDiscountResponse);

  rpc GetSchedule(CoreScheduleRequest) returns (CoreScheduleResponse);

  rpc AddLesson(AddLessonRequest) returns (AddLessonResponse);

}

// ===== Messages =====

message RegisterStudentRequest {
  string name = 1;           // Имя студента
  string trace_id = 2;       // ID трассировки
}

message RegisterStudentResponse {
  int32 student_id = 1;      // ID нового студента
  string name = 2;           // Имя студента
  string error = 3;          // Сообщение об ошибке
}

message AddGradeRequest {
  int32 student_id = 1;      // ID студента
  string course_name = 2;    // Название курса
  int32 value = 3;           // Оценка (1-5)
  string trace_id = 4;       // ID трассировки
}

message AddGradeResponse {
  bool success = 1;          // true = оценка успешно выставлена
  string error = 2;          // Сообщение об ошибке
}

message MarkAttendanceRequest {
  int32 student_id = 1;      // ID студента
  int32 lesson_id = 2;       // ID занятия
  string status = 3;         // Статус: PRESENT/ABSENT/LATE/EXCUSED
  string trace_id = 4;       // ID трассировки
}

message MarkAttendanceResponse {
  bool success = 1;          // true = посещаемость отмечена
  string error = 2;          // Сообщение об ошибке
}

message GetGradeReportRequest {
  int32 student_id = 1;      // ID студента
  string trace_id = 2;       // ID трассировки
}

message GetGradeReportResponse {
  string report_text = 1;    // Текст отчёта
  string error = 2;          // Сообщение об ошибке
}

message CalculateDiscountRequest {
  int32 student_id = 1;
  string trace_id = 2;
}

message CalculateDiscountResponse {
  double discount_percent = 1;
  string promo_code = 2;
  string error = 3;
}

message CoreScheduleRequest {
  string day_filter = 1;
  string trace_id = 2;
}

message CoreScheduleResponse {
  repeated CoreLessonData lessons = 1;
  string error = 2;
}

message CoreLessonData {
  int32 lesson_id = 1;
  string course_name = 2;
  string teacher = 3;
  string room = 4;
  string date_time = 5;
}

message AddLessonRequest {
string course_name = 1;
    string teacher = 2;
string room = 3;
    string date_time = 4;
string trace_id = 5;
    }

message AddLessonResponse {
  int32 lesson_id = 1;
  string error = 2;
}