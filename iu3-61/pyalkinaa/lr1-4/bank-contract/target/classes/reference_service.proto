syntax = "proto3";

package bank.contract;

option java_package = "com.bank.contract";
option java_multiple_files = true;

service ReferenceService {
  rpc ValidateAccountType(ValidateAccountTypeRequest) returns (ValidateAccountTypeResponse);
  rpc ValidateAmount(ValidateAmountRequest) returns (ValidateAmountResponse);
  rpc GetInterestRule(GetInterestRuleRequest) returns (GetInterestRuleResponse);
}

message ValidateAccountTypeRequest {
  string account_type = 1;
}

message ValidateAccountTypeResponse {
  bool valid = 1;
  string message = 2;
  string normalized_account_type = 3;
}

message ValidateAmountRequest {
  double amount = 1;
  string operation = 2;
}

message ValidateAmountResponse {
  bool valid = 1;
  string message = 2;
}

message GetInterestRuleRequest {
  string account_type = 1;
  double base_percent = 2;
  double current_balance = 3;
}

message GetInterestRuleResponse {
  bool found = 1;
  string message = 2;
  double effective_percent = 3;
  double bonus_amount = 4;
  string strategy_name = 5;
}
